  image:
    title:
      zh-cn: 镜像
      en-us: Image
    type: string
    format: image-digest-selector
  healthCheckProbe:
    type: object
    required:
      - httpGet
    properties:
      httpGet:
        title:
          zh-cn: Http Get 健康检查
          en-us: Http Get Health Check
        type: object
        required:
          - port
          - path
        properties:
          path:
            title:
              zh-cn: Get 请求路径
              en-us: HTTP Get Path
            type: string
          port:
            title:
              zh-cn: Get 请求端口
              en-us: HTTP Get Port
            type: integer
            format: formdata-selector
            script: |-
              // console.log(options.id)
              if (formdata && options && options.id) {
                try {
                  const idParts = options.id.split('_');
                  let container = null; 
                  let currentObject = formdata;
                  for (let i = 1; i < idParts.length; i++) {
                    const key = idParts[i];
                    const nextObject = currentObject?.[key];

                    if (nextObject && typeof nextObject === 'object') {
                      currentObject = nextObject;
                      if (currentObject.ports && Array.isArray(currentObject.ports)) {
                        container = currentObject;
                      }
                    } else {
                      break;
                    }
                  }
                  const containerPorts = container?.ports || [];
                  return containerPorts
                    .filter(p => p && typeof p.containerPort === 'number')
                    .map(p => ({
                      label: String(p.containerPort) + (p.portName ? ` (${p.portName})` : ''),
                      value: p.containerPort
                    }));
                } catch (e) {
                  console.error('Error while computing dynamic options:', e);
                  return [];
                }
              }
              return [];
      initialDelaySeconds:
        title:
          zh-cn: 首次检查时间（s）
          en-us: Initial Delay (s)
        default: 300
        type: integer
      periodSeconds:
        title:
          zh-cn: 检查间隔时间（s）
          en-us: Period Seconds
        default: 300
        type: integer
      timeoutSeconds:
        title:
          zh-cn: 超时等待时长（s）
          en-us: Timeout (s)
        default: 300
        type: integer
      failureThreshold:
        title:
          zh-cn: 最小连续成功次数
          en-us: Minimum Consecutive Successes
        default: 1
        type: integer
        minimum: 1
        multipleOf: 1
  prometheusScraper:
    type: object
    title:
      zh-cn: Prometheus 指标采集配置
      en-us: Prometheus Scraper
    properties:
      endpoints:
        title:
          zh-cn: 采集端点
          en-us: Endpoints
        type: array
        items:
          type: object
          required:
            - port
            - path
          properties:
            port:
              title:
                zh-cn: 采集端口
                en-us: Port
              type: integer
              format: formdata-selector
              script: |-
                if (formdata && options && options.id) {
                  try {
                    const idParts = options.id.split('_');
                    let containerHolder = null;
                    let currentObject = formdata;
                    for (let i = 1; i < idParts.length; i++) {
                      const key = idParts[i];
                      const nextObject = currentObject?.[key];
                      if (nextObject && typeof nextObject === 'object') {
                        currentObject = nextObject;
                        if (currentObject.hasOwnProperty('mainContainer')) {
                          containerHolder = currentObject;
                        }
                      } else {
                        break;
                      }
                    }
                    if (!containerHolder) {
                      console.error("无法在ID路径中找到任何包含 'mainContainer' 的对象:", options.id);
                      return [];
                    }
                    let allPorts = [];
                    if (containerHolder.mainContainer && containerHolder.mainContainer.ports) {
                      allPorts = allPorts.concat(containerHolder.mainContainer.ports);
                    }
                    if (containerHolder.sidecarContainers && Array.isArray(containerHolder.sidecarContainers)) {
                      containerHolder.sidecarContainers.forEach(sidecar => {
                        if (sidecar && sidecar.ports) {
                          allPorts = allPorts.concat(sidecar.ports);
                        }
                      });
                    }
                    return allPorts
                      .filter(p => p && typeof p.containerPort === 'number')
                      .map(p => ({
                        label: String(p.containerPort) + (p.portName ? ` (${p.portName})` : ''),
                        value: p.containerPort
                      }));
                  } catch (e) {
                    console.error('计算动态选项时出错:', e);
                    return [];
                  }
                }
                return [];
            path:
              type: string
              title:
                zh-cn: 采集路径
                en-us: Path
