entrypointService:
  name: qwen35-4b
  serviceType: replicaSet
  replicaSet:
    pod:
      mainContainer:
        name: vllm
        image: hub.6scloud.com/siliconflow/vllm/vllm-openai:qwen3_5
        ports:
          - containerPort: 8000
            portName: http
        command:
          - /bin/bash
          - '-c'
          - >-
            set -e

            echo ">>> Applying CUDA compat fix..."

            rm -f /etc/ld.so.conf.d/*cuda-compat.conf || true

            ldconfig || true

            echo ">>> Using ModelScope as model source..."

            export VLLM_USE_MODELSCOPE=True


            # 模型缓存校验优化

            MODEL_DIR="/cache/modelscope/models/Qwen/Qwen3.5-4B"

            MODEL_REF="Qwen/Qwen3.5-4B"

            REQUIRED_FILES=("config.json" "model.safetensors.index.json"
            "tokenizer.json")


            CACHE_VALID=true

            if [ -d "${MODEL_DIR}" ]; then
              for f in "${REQUIRED_FILES[@]}"; do
                if [ ! -f "${MODEL_DIR}/${f}" ]; then
                  echo ">>> Missing ${f}, cache invalid"
                  CACHE_VALID=false
                  break
                fi
              done
            else
              CACHE_VALID=false
            fi


            if [ "$CACHE_VALID" = true ]; then
              echo ">>> Valid model cache found: ${MODEL_DIR}"
              MODEL_REF="${MODEL_DIR}"
            else
              echo ">>> Downloading from ModelScope: ${MODEL_REF}"
            fi


            echo ">>> Starting vLLM..."

            vllm serve "${MODEL_REF}" \
              --host 127.0.0.1 \
              --port 8000 \
              --tensor-parallel-size 1 \
              --dtype auto \
              --download-dir /cache/modelscope \
              --served-model-name Qwen/Qwen3.5-4B \
              --gpu-memory-utilization 0.90 \
              --max-model-len 262144 \
              --max-num-seqs 64 \
              --max-num-batched-tokens 65536 \
              --reasoning-parser qwen3 \
              --enable-auto-tool-choice \
              --tool-call-parser qwen3_coder \
              --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":2}' \
              --disable-log-requests &
            VLLM_PID=$!


            # 健康检查优化：更频繁检查，更快发现

            echo ">>> Waiting for vLLM health..."

            HEALTHY=false

            for i in $(seq 1 300); do
              if curl -sf "http://127.0.0.1:8000/health" >/dev/null 2>&1; then
                echo ">>> vLLM is healthy (took ${i}s)"
                HEALTHY=true
                break
              fi
              sleep 1
            done


            if [ "$HEALTHY" != true ]; then
              echo ">>> vLLM failed to start within 300s"
              exit 1
            fi


            # 热启动预热优化：多阶段warmup

            echo ">>> Starting multi-stage warmup..."


            # Stage 1: 短文本非流式 (激活基础推理路径)

            echo ">>> Stage 1: Short non-stream warmup..."

            python3 <<'PYEOF' || true

            import json, urllib.request

            payload = {
                "model": "Qwen/Qwen3.5-4B",
                "messages": [{"role": "user", "content": "Hello"}],
                "max_tokens": 128,
                "temperature": 0.7
            }

            req = urllib.request.Request(
                "http://127.0.0.1:8000/v1/chat/completions",
                data=json.dumps(payload).encode(),
                headers={"Content-Type": "application/json"},
                method="POST"
            )

            try:
                with urllib.request.urlopen(req, timeout=60) as r:
                    print(f"Stage 1 OK: {r.status}")
            except Exception as e:
                print(f"Stage 1 warning: {e}")
            PYEOF


            # Stage 2: 短文本流式 (激活流式推理路径)

            echo ">>> Stage 2: Short stream warmup..."

            python3 <<'PYEOF' || true

            import json, urllib.request

            payload = {
                "model": "Qwen/Qwen3.5-4B",
                "messages": [{"role": "user", "content": "Hi"}],
                "max_tokens": 64,
                "stream": True
            }

            req = urllib.request.Request(
                "http://127.0.0.1:8000/v1/chat/completions",
                data=json.dumps(payload).encode(),
                headers={"Content-Type": "application/json"},
                method="POST"
            )

            try:
                with urllib.request.urlopen(req, timeout=60) as r:
                    chunks = 0
                    while True:
                        line = r.readline()
                        if not line or line.strip() == b"data: [DONE]":
                            break
                        chunks += 1
                    print(f"Stage 2 OK: {chunks} chunks")
            except Exception as e:
                print(f"Stage 2 warning: {e}")
            PYEOF


            # Stage 3: 中等长度文本 (预热中等KV Cache)

            echo ">>> Stage 3: Medium context warmup (4K)..."

            python3 <<'PYEOF' || true

            import json, urllib.request, time

            long_text = "Hello world " * 200

            payload = {
                "model": "Qwen/Qwen3.5-4B",
                "messages": [
                    {"role": "system", "content": "You are a helpful assistant."},
                    {"role": "user", "content": long_text}
                ],
                "max_tokens": 256,
                "temperature": 0.7
            }

            req = urllib.request.Request(
                "http://127.0.0.1:8000/v1/chat/completions",
                data=json.dumps(payload).encode(),
                headers={"Content-Type": "application/json"},
                method="POST"
            )

            try:
                start = time.time()
                with urllib.request.urlopen(req, timeout=120) as r:
                    _ = r.read()
                print(f"Stage 3 OK: {time.time()-start:.1f}s")
            except Exception as e:
                print(f"Stage 3 warning: {e}")
            PYEOF


            echo ">>> All warmup stages completed!"

            wait "${VLLM_PID}"
        env:
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: VLLM_USE_MODELSCOPE
            value: 'True'
          - name: MODELSCOPE_CACHE
            value: /cache/modelscope
          - name: CUDA_DEVICE_MAX_CONNECTIONS
            value: '1'
          - name: PYTORCH_CUDA_ALLOC_CONF
            value: expandable_segments:True
        livenessProbe:
          set: false
        readinessProbe:
          set: true
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        startupProbe:
          set: false
      sidecarContainers:
        - name: protocol-adapter
          image: hub.6scloud.com/d1r7umcsfi9c73b4drdg/python:3.10-slim
          ports:
            - containerPort: 8001
              portName: proxy-api
          command:
            - /bin/bash
            - '-c'
            - >-
              set -e

              pip install fastapi uvicorn httpx --no-cache-dir -q

              cat > /tmp/proxy.py <<'PYEOF'

              import json

              import os

              import httpx

              import uvicorn

              from fastapi import FastAPI, Request

              from fastapi.responses import Response, StreamingResponse


              app = FastAPI()

              VLLM_URL = os.getenv("TARGET_BASE_URL", "http://127.0.0.1:8000")

              DEFAULT_MODEL = os.getenv("DEFAULT_MODEL", "Qwen/Qwen3.5-4B")


              def map_reasoning_fields(obj):
                  if isinstance(obj, dict):
                      out = {}
                      for k, v in obj.items():
                          if k == "reasoning":
                              out["reasoning_content"] = map_reasoning_fields(v)
                          else:
                              out[k] = map_reasoning_fields(v)
                      return out
                  if isinstance(obj, list):
                      return [map_reasoning_fields(x) for x in obj]
                  return obj

              async def forward_stream(resp: httpx.Response,
              enable_reasoning_mapping: bool):
                  buffer = b""
                  async for chunk in resp.aiter_bytes():
                      buffer += chunk
                      while b"\n" in buffer:
                          line, buffer = buffer.split(b"\n", 1)
                          line = line.rstrip(b"\r")
                          if enable_reasoning_mapping and line.startswith(b"data: ") and line != b"data: [DONE]":
                              try:
                                  payload = json.loads(line[6:])
                                  payload = map_reasoning_fields(payload)
                                  yield b"data: " + json.dumps(payload, ensure_ascii=False).encode("utf-8") + b"\n"
                              except Exception:
                                  yield line + b"\n"
                          else:
                              yield line + b"\n"
                  if buffer:
                      yield buffer

              async def handle_chat_like(request: Request, target_path: str):
                  force_stream_usage = os.getenv("FORCE_STREAM_USAGE", "true").lower() == "true"
                  enable_reasoning_mapping = os.getenv("ENABLE_REASONING_MAPPING", "false").lower() == "true"

                  body = await request.body()
                  is_stream = False
                  if body:
                      try:
                          data = json.loads(body)
                          if isinstance(data, dict):
                              data.setdefault("model", DEFAULT_MODEL)
                              is_stream = bool(data.get("stream", False))
                              if force_stream_usage and is_stream:
                                  data.setdefault("stream_options", {})
                                  data["stream_options"]["include_usage"] = True
                              body = json.dumps(data, ensure_ascii=False).encode("utf-8")
                      except Exception:
                          pass

                  headers = {
                      k: v
                      for k, v in request.headers.items()
                      if k.lower() not in ("host", "content-length", "connection", "transfer-encoding")
                  }

                  client = httpx.AsyncClient(base_url=VLLM_URL, timeout=None)
                  try:
                      req = client.build_request("POST", target_path, content=body, headers=headers)
                      resp = await client.send(req, stream=True)
                  except Exception as e:
                      await client.aclose()
                      return Response(content=f"Proxy Error: {e}", status_code=502)

                  if is_stream:
                      async def stream_wrapper():
                          try:
                              async for item in forward_stream(resp, enable_reasoning_mapping):
                                  yield item
                          finally:
                              await resp.aclose()
                              await client.aclose()

                      return StreamingResponse(
                          stream_wrapper(),
                          status_code=resp.status_code,
                          media_type=resp.headers.get("content-type", "text/event-stream"),
                      )

                  try:
                      content = await resp.aread()
                  finally:
                      await resp.aclose()
                      await client.aclose()

                  if enable_reasoning_mapping and resp.status_code == 200 and "application/json" in resp.headers.get("content-type", ""):
                      try:
                          payload = json.loads(content)
                          payload = map_reasoning_fields(payload)
                          content = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                      except Exception:
                          pass

                  return Response(content=content, status_code=resp.status_code, media_type=resp.headers.get("content-type"))

              @app.get("/health")

              async def health():
                  async with httpx.AsyncClient(base_url=VLLM_URL, timeout=3.0) as client:
                      try:
                          r = await client.get("/health")
                          return Response(content=r.content, status_code=r.status_code)
                      except Exception:
                          return Response(content=b"Main container not ready", status_code=503)

              @app.post("/v1/chat/completions")

              async def chat(request: Request):
                  return await handle_chat_like(request, "/v1/chat/completions")

              @app.post("/v1/completions")

              async def completion(request: Request):
                  return await handle_chat_like(request, "/v1/completions")

              @app.api_route("/{path:path}", methods=["GET", "POST", "PUT",
              "DELETE", "PATCH", "OPTIONS"])

              async def proxy(path: str, request: Request):
                  if request.method == "OPTIONS":
                      return Response(status_code=204)
                  body = await request.body()
                  headers = {
                      k: v
                      for k, v in request.headers.items()
                      if k.lower() not in ("host", "content-length", "connection")
                  }
                  url = f"/{path}"
                  if request.url.query:
                      url = f"{url}?{request.url.query}"
                  async with httpx.AsyncClient(base_url=VLLM_URL, timeout=None) as client:
                      try:
                          r = await client.request(request.method, url, content=body, headers=headers)
                          return Response(content=r.content, status_code=r.status_code, media_type=r.headers.get("content-type"))
                      except Exception as e:
                          return Response(content=f"Proxy Error: {e}", status_code=502)

              if __name__ == "__main__":
                  uvicorn.run(app, host="0.0.0.0", port=8001, timeout_graceful_shutdown=25)
              PYEOF

              exec python /tmp/proxy.py
          env:
            - name: TARGET_BASE_URL
              value: http://127.0.0.1:8000
            - name: DEFAULT_MODEL
              value: Qwen/Qwen3.5-4B
            - name: ENABLE_REASONING_MAPPING
              value: 'True'
            - name: FORCE_STREAM_USAGE
              value: 'True'
          livenessProbe:
            set: false
          readinessProbe:
            set: true
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            set: false
      terminationGracePeriodSeconds: 180
      recommendInstanceTypes:
        - nvidia.rtx4090.g1.amd64
        - nvidia.rtx5090.g1.amd64
    autoScaler:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 10
          policy:
            type: Percent
            value: 100
            periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 600
          policy:
            type: Percent
            value: 10
            periodSeconds: 60
      metrics:
        - type: Function
          metric:
            name: Concurrency
            target:
              value: 64
              type: Gauge
      minReplicas: 1
      maxReplicas: 10
    resources:
      requests:
        nvidia.com/gpu: 1
      limits:
        nvidia.com/gpu: 1
gateway:
  entrypointPort: 8001
  defaultConcurrencyLimit: 64
  workloadType: OpenAICompatibleChat
